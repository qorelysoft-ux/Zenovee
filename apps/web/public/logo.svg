<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B9FD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Logo mark (Z shape with arrow) -->
  <g transform="translate(200, 150)">
    <!-- Curved Z shape -->
    <path d="M 300 0 Q 400 80 300 160 L 160 160 L 300 320 Q 200 240 160 160" fill="none" stroke="url(#logoGradient)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow -->
    <path d="M 450 80 L 620 -50 L 480 180" fill="url(#logoGradient)"/>
  </g>
  <!-- Text: ZENOVEE -->
  <text x="200" y="550" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#1e3a8a" letter-spacing="8">ZENOVEE</text>
  <!-- Subtitle: SAAS WEB APPLICATION -->
  <text x="200" y="650" font-family="Arial, sans-serif" font-size="60" fill="#64748b" letter-spacing="3">SAAS WEB APPLICATION</text>
</svg>