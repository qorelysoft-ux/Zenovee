<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenovee</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title">Zenovee</div>
        <a class="link" href="https://www.zenovee.in" target="_blank" rel="noreferrer">Open</a>
      </div>

      <div id="status" class="status">Loading…</div>

      <div class="section">
        <div class="label">Login</div>
        <input id="email" class="input" placeholder="Email" />
        <input id="password" type="password" class="input" placeholder="Password" />
        <button id="login" class="button">Login</button>
        <button id="logout" class="button secondary">Logout</button>
      </div>

      <div class="section">
        <div class="label">Quick links</div>
        <div class="links">
          <a class="pill" href="https://www.zenovee.in/dashboard" target="_blank" rel="noreferrer">Dashboard</a>
          <a class="pill" href="https://www.zenovee.in/tools" target="_blank" rel="noreferrer">Tools</a>
          <a class="pill" href="https://www.zenovee.in/pricing" target="_blank" rel="noreferrer">Pricing</a>
        </div>
      </div>

      <div class="section">
        <div class="label">Entitlements</div>
        <div id="ents" class="ents">—</div>
      </div>

      <div class="section">
        <div class="label">Premium quick access</div>
        <div id="quickTools" class="quick-tools">
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/viral-short-creator-engine">Viral Short</button>
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/code-documentation-generator">Code Docs</button>
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/multi-platform-image-resizer">Image Resizer</button>
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/keyword-cluster-engine">Keyword Cluster</button>
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/meeting-notes-to-email-converter">Notes → Email</button>
          <button class="tool-btn" data-url="https://www.zenovee.in/tools/dynamic-qr-code-system">QR Tool</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Current page helpers</div>
        <div class="actions">
          <button id="openSelectionTool" class="button">Open tools page</button>
          <button id="searchSelectionTool" class="button secondary">Search selection</button>
          <button id="openDashboard" class="button secondary">Open dashboard</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Send text to tools</div>
        <input id="toolSearch" class="input" placeholder="Paste text or keyword" />
        <div class="actions">
          <button id="openSearchResults" class="button">Open matching tools</button>
          <button id="openMarketingTool" class="button secondary">Search marketing tools</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Run a tool with API key</div>
        <input id="apiKey" class="input" placeholder="zv_live_..." />
        <input id="toolSlug" class="input" placeholder="Tool slug (e.g. ad-copy-conversion-engine)" />
        <textarea id="toolPayload" class="input" rows="4" placeholder='JSON payload e.g. {"product":"AI SaaS","audience":"founders"}'></textarea>
        <button id="runApiTool" class="button">Run tool</button>
        <div id="apiToolResult" class="ents">—</div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
